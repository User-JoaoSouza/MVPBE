<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Circuito Terê Verde</title>
    <link rel="stylesheet" href="../Styles/Index.css">
    <link rel="stylesheet" href="../Styles/Admin.css">
    <link rel="shortcut icon" href="../Imagens/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="main_header">
        <nav class="navbar">
            <div class="nav_logo">
                <img class="logo_Dedo_Deus" src="https://upload.wikimedia.org/wikipedia/pt/a/ad/Unifeso_logomarca.png" alt="Unifeso Logo">
            </div>
            <div class="nav_content">
                <ul class="nav_menu">
                    <li><a href="../Index.html">Início</a></li>
                    <li><a href="Agenda.html">Agenda</a></li>
                    <li><a href="Sobre.html">Sobre</a></li>
                    <li><a href="Contato.html">Contato</a></li>
                    <li><a href="#" id="admin-link" style="color: #ff6b35;">Painel Admin</a></li>
                </ul>
                <div class="nav_login">
                    <button onclick="logoutUser()" class="login_button" style="background:#e53e3e">Sair</button>
                </div>
            </div>
        </nav>
    </header>

    <main style="padding: 2rem; min-height: 80vh;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="color: #2c5530; margin: 0;">Painel Administrativo</h1>
                <p id="welcome-admin" style="font-weight: bold; color: #666;"></p>
            </div>

            <div class="admin-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                <div class="admin-card" style="background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h3 style="color: #2c5530; margin-bottom: 1rem;">📅 Agendamentos</h3>
                    <p>Visualizar e gerenciar reservas de trilhas</p>
                    <button class="trilhas_button" onclick="showAgendamentos()" style="margin-top: 1rem;">Ver Agendamentos</button>
                </div>

                <div class="admin-card" style="background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h3 style="color: #2c5530; margin-bottom: 1rem;">👥 Usuários</h3>
                    <p>Visualizar e gerenciar usuários cadastrados</p>
                    <button class="trilhas_button" onclick="window.location.href='Usuarios.html'" style="margin-top: 1rem;">Ver Usuários</button>
                </div>

                <div class="admin-card" style="background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h3 style="color: #2c5530; margin-bottom: 1rem;">🥾 Trilhas</h3>
                    <p>Cadastrar e gerenciar trilhas disponíveis</p>
                    <button class="trilhas_button" onclick="window.location.href='CadastroTrilha.html'" style="margin-top: 1rem;">Cadastrar Trilha</button>
                </div>
            </div>

            <div id="agendamentos-section" style="display: none; margin-top: 3rem;">
                <div style="background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h2 style="color: #2c5530; margin-bottom: 1.5rem;">📋 Agendamentos Recentes</h2>
                    <div id="agendamentos-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/Auth.js"></script>
    <script>
    // Executa imediatamente para evitar que a página apareça para quem não deve

        async function verificarAdmin() {
            const user = JSON.parse(sessionStorage.getItem('currentUser') || '{}');

            if (!user || !user.login) {
                alert('Acesso restrito! Por favor, faça login.');
                window.location.replace('../Index.html');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/auth/me', {
                    headers: { 'x-user-login': user.login }
                });

                const data = await response.json();

                if (!data.success || data.user.role !== 'admin') {
                    alert('Acesso restrito! Você não tem permissão de administrador.');
                    window.location.replace('../Index.html');
                } else {
                    // ✅ É admin confirmado pelo banco, mostra o nome
                    document.getElementById('welcome-admin').textContent = `Olá, ${data.user.login}`;
                }

            } catch (err) {
                alert('Erro ao verificar permissões. Tente novamente.');
                window.location.replace('../Index.html'); user.name
            }
        }

        verificarAdmin();

        // --- Mantenha suas outras funções (showAgendamentos, etc) abaixo ---
        function showAgendamentos() {
            const section = document.getElementById('agendamentos-section');
            const list = document.getElementById('agendamentos-list');
            const agendamentos = JSON.parse(localStorage.getItem('agendamentos') || '[]');

            if (agendamentos.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666;">Nenhum agendamento encontrado no sistema.</p>';
            } else {
                list.innerHTML = agendamentos.map(agendamento => `
                    <div style="border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: #fafafa;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                            <div><strong>Nome:</strong> ${agendamento.nome}</div>
                            <div><strong>Trilha:</strong> ${agendamento.trilha}</div>
                            <div><strong>Data:</strong> ${agendamento.data}</div>
                            <div><strong>Status:</strong> <span style="color: #4caf50;">Confirmado</span></div>
                        </div>
                        <button onclick="excluirAgendamento(${agendamento.id})" style="background: #e53e3e; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px;">Excluir</button>
                    </div>
                `).join('');
            }
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function excluirAgendamento(id) {
            if (confirm('Deseja excluir este registro?')) {
                const agendamentos = JSON.parse(localStorage.getItem('agendamentos') || '[]');
                const filtrados = agendamentos.filter(a => a.id !== id);
                localStorage.setItem('agendamentos', JSON.stringify(filtrados));
                showAgendamentos();
            }
        }
    </script>
</body>
</html>
