<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - Circuito Terê Verde</title>
    <link rel="stylesheet" href="../Styles/Index.css">
    <link rel="stylesheet" href="../Styles/Admin.css">
    <link rel="shortcut icon" href="../Imagens/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="main_header">
        <nav class="navbar">
            <div class="nav_logo">
                <img class="logo_Dedo_Deus" src="https://upload.wikimedia.org/wikipedia/pt/a/ad/Unifeso_logomarca.png" alt="dedo_de_deus_logo.png">
            </div>
            <div class="nav_content">
                <ul class="nav_menu">
                    <li><a href="../Index.html">Início</a></li>
                    <li><a href="Agenda.html">Agenda</a></li>
                    <li><a href="Sobre.html">Sobre</a></li>
                    <li><a href="Contato.html">Contato</a></li>
                    <li><a href="Admin.html" style="color: #ff6b35;">Painel Admin</a></li>
                </ul>
                <div class="nav_login">
                    <button onclick="logout()" class="login_button">Sair</button>
                </div>
            </div>
        </nav>
    </header>

    <main style="padding: 2rem; min-height: 80vh;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="color: #2c5530; margin: 0;">👥 Gerenciar Usuários</h1>
                <div>
                    <button onclick="window.location.href='Admin.html'" style="background: #38a169; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; margin-right: 10px;">← Voltar</button>
                    <button onclick="logout()" style="background: #e53e3e; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600;">Sair</button>
                </div>
            </div>

            <div style="background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="color: #2c5530; margin: 0;">Lista de Usuários Cadastrados</h2>
                    <div style="color: #666; font-size: 0.9rem;">
                        Total: <span id="total-usuarios" style="font-weight: bold; color: #2c5530;">0</span> usuários
                    </div>
                </div>
                <div style="background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 5px; padding: 10px; margin-bottom: 1rem; font-size: 0.9rem;">
                    ⚠️ <strong>Aviso:</strong> As senhas são exibidas apenas para administradores. Mantenha essas informações seguras.
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 1rem;">
                    <input type="text"
                           id="search-login"
                           placeholder="Digite o login para buscar"
                           style="padding: 8px; border: 2px solid #e0e0e0; border-radius: 5px; flex: 1;">
                    <button onclick="buscarUsuario()" style="padding: 8px 16px; background: #2c5530; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        🔍 Buscar
                    </button>
                    <button onclick="loadUsuarios()" style="padding: 8px 16px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        Limpar
                    </button>
                </div>
                <div id="usuarios-list"></div>
            </div>
        </div>
    </main>

    <script src="../js/Auth.js"></script>
    <script>

        function getCurrentUserLogin() {
            const user = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
            return user.login || '';
        }

        // Verificar se usuário está logado como admin
        if (!isAdminLoggedIn()) {
            window.location.href = '../Index.html';
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = '../Index.html';
        }


        function renderList(users) {
            const list = document.getElementById('usuarios-list');
            const totalElement = document.getElementById('total-usuarios');
            totalElement.textContent = users.length;

            if (users.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666; padding: 2rem;">Nenhum usuário encontrado.</p>';
                return;
            }

            list.innerHTML = users.map(user => `
        <div style="border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; background: #fafafa;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
                <div><strong>Nome:</strong> ${user.nome}</div>
                <div><strong>Login:</strong> <span style="color: #2c5530; font-family: monospace; font-weight: bold;">${user.login}</span></div>
                <div><strong>Role:</strong> 
                    <span style="background: ${user.role === 'admin' ? '#c6f6d5' : '#e2e8f0'}; color: ${user.role === 'admin' ? '#276749' : '#4a5568'}; padding: 2px 10px; border-radius: 999px; font-size: 0.85rem; font-weight: 600;">
                        ${user.role === 'admin' ? '🛡️ Admin' : '👤 Usuário'}
                    </span>
                </div>
                <div><strong>Cadastro:</strong> ${new Date(user.created_at).toLocaleDateString('pt-BR')}</div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 1rem;">
    ${user.role !== 'admin' ? `
        <button onclick="promoverAdmin('${user.login}')" 
            style="background: #2c5530; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">
            🛡️ Tornar Admin
        </button>
    ` : (user.login !== getCurrentUserLogin() ? `
        <button onclick="demoteAdmin('${user.login}')" 
            style="background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">
            ⬇️ Rebaixar para Usuário
        </button>
    ` : `
        <span style="color: #276749; font-weight: 600; padding: 8px 0;">✅ Já é administrador</span>
    `)}
</div>
        </div>
    `).join('');
        }


        async function loadUsuarios() {
            const loginHeader = getCurrentUserLogin();
            if (!loginHeader) {
                window.location.href = '../Index.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/debug/users', {
                    headers: { 'x-user-login': loginHeader }
                });
                if (!response.ok) throw new Error('Erro ao carregar');
                const users = await response.json();
                renderList(users);
            } catch (err) {
                document.getElementById('usuarios-list').innerHTML = `<p style="color: #e53e3e;">❌ ${err.message}</p>`;
                document.getElementById('total-usuarios').textContent = '0';
            }
        }

        async function buscarUsuario() {
            const loginParam = document.getElementById('search-login').value.trim();
            const loginHeader = getCurrentUserLogin();
            if (!loginParam || !loginHeader) return;

            try {
                const response = await fetch(`http://localhost:3000/debug/users/${encodeURIComponent(loginParam)}`, {
                    headers: { 'x-user-login': loginHeader }
                });
                if (!response.ok) throw new Error('Usuário não encontrado');
                const user = await response.json();
                renderList([user]);
            } catch (err) {
                document.getElementById('usuarios-list').innerHTML = `<p style="color: #e53e3e;">❌ ${err.message}</p>`;
                document.getElementById('total-usuarios').textContent = '0';
            }
        }

        async function promoverAdmin(login) {
            if (!confirm(`Deseja promover "${login}" a administrador?`)) return;

            try {
                const response = await fetch('http://localhost:3000/auth/promover', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`✅ ${data.message}`);
                    loadUsuarios();
                } else {
                    alert(`❌ ${data.error}`);
                }
            } catch (err) {
                alert('❌ Erro ao conectar com o servidor.');
            }
        }

        async function demoteAdmin(login) {
            if (!confirm(`Deseja rebaixar "${login}" a usuário comum?`)) return;

            const token = localStorage.getItem('authToken');
            if (!token) return;

            try {
                const response = await fetch('http://localhost:3000/auth/demote', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ login })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`✅ ${data.message}`);
                    loadUsuarios();
                } else {
                    alert(`❌ ${data.error}`);
                }
            } catch (err) {
                alert('❌ Erro ao conectar com o servidor.');
            }
        }

        function excluirUsuario(id) {
            if (confirm('Tem certeza que deseja excluir este usuário? Esta ação não pode ser desfeita.')) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const usuariosAtualizados = users.filter(user => user.id !== id);
                localStorage.setItem('users', JSON.stringify(usuariosAtualizados));
                loadUsuarios(); // Recarrega a lista
            }
        }

        // Carregar usuários ao inicializar a página
        loadUsuarios();
    </script>
</body>
</html>
